# CPU-only stack for polyglot-demo. No GPU runtime needed.
# All ML inference runs on the host's Xeon CPU via int8 quantized models.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: polyglot-demo/backend:dev
    container_name: polyglot-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Inside the container, mount points are absolute.
      MODEL_CACHE_DIR: /models
      JOB_ARTIFACTS_DIR: /jobs
      HF_HOME: /models/huggingface
      # HuggingFace auth token — required for gated repos (e.g. IndicF5
      # at ai4bharat/IndicF5). Set HF_TOKEN in .env. We forward both the
      # newer (HF_TOKEN) and older (HUGGING_FACE_HUB_TOKEN) name because
      # different transformers versions look at different env vars; the
      # fallback chain handles either spelling, and the empty default
      # keeps anonymous access working for ungated models.
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-${HF_TOKEN:-}}
      # IndicF5's trust_remote_code imports wandb at inference time
      # (it's used at training in upstream). Disable phone-home so it's
      # silent; we have no use for run logging in this pipeline.
      WANDB_DISABLED: "true"
      WANDB_MODE: "disabled"
      # Avoid CUDA probing on a CPU-only image.
      CUDA_VISIBLE_DEVICES: ""
      # Points at the MuseTalk lipsync microservice. Resolved via Docker DNS.
      MUSETALK_SERVICE_URL: http://lipsync-musetalk:8000
      # Points at the LatentSync lipsync microservice. Scaffold only in
      # PR-LS-1a (the service returns 501); real inference in PR-LS-1c.
      LATENTSYNC_SERVICE_URL: http://lipsync-latentsync:8000
      # Optional pre-stabilization stage (ffmpeg vidstab). Off by
      # default — most source videos don't need it. Turn on to remove
      # handheld camera shake from clips before they reach downstream
      # stages; primarily helps lipsync quality by stabilizing the
      # face track. See backend/app/pipeline/stabilize.py.
      ENABLE_VIDEO_STABILIZATION: ${ENABLE_VIDEO_STABILIZATION:-false}
      STABILIZE_SMOOTHING: ${STABILIZE_SMOOTHING:-10}
      STABILIZE_SHAKINESS: ${STABILIZE_SHAKINESS:-5}
      # Post-stabilization: stabilize the lipsynced video before mux.
      # Catches any jitter from the lipsync pipeline itself (affine
      # residual, VAE precision, etc.) that pre-stabilization can't
      # address. Independent of ENABLE_VIDEO_STABILIZATION — they can
      # stack or be used independently. Off by default; same tuning
      # (STABILIZE_SMOOTHING / STABILIZE_SHAKINESS) applies to both.
      ENABLE_OUTPUT_STABILIZATION: ${ENABLE_OUTPUT_STABILIZATION:-false}
    volumes:
      - models:/models
      - jobs:/jobs
      # Bind-mount source for live reload during development.
      - ./backend/app:/app/app
      # Expose helper scripts inside the container so `docker compose exec`
      # can run them without docker-cp dance (e.g. download_models.sh).
      - ./scripts:/app/scripts:ro
    ports:
      # Host port is configurable via BACKEND_PORT (default 8088) to avoid
      # clashing with other local apps that use 8000. Container stays on 8000.
      - "${BACKEND_PORT:-8088}:8000"
    # Xeon machines often have many cores; cap so we don't starve the host.
    deploy:
      resources:
        limits:
          cpus: "8.0"
          memory: 12g

  # MuseTalk lipsync microservice. Kept as a separate service (with its own
  # Python env) because MuseTalk's pinned deps — notably transformers 4.39 —
  # conflict with the main backend's coqui-tts pins.
  #
  # PR 1a: HTTP scaffold only; /lipsync returns 501. PR 1b/1c add real
  # inference. The shared `jobs` + `models` volumes let both services pass
  # file paths (not bytes) back and forth.
  lipsync-musetalk:
    build:
      context: ./services/musetalk
      dockerfile: Dockerfile
    image: polyglot-demo/lipsync-musetalk:dev
    container_name: polyglot-lipsync-musetalk
    restart: unless-stopped
    environment:
      MODEL_CACHE_DIR: /models
      JOB_ARTIFACTS_DIR: /jobs
      HF_HOME: /models/huggingface
      # HF auth token — see comment in the backend service above.
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-${HF_TOKEN:-}}
      CUDA_VISIBLE_DEVICES: ""
      # IPEX compute dtype. See .env.example.
      MUSETALK_IPEX_DTYPE: ${MUSETALK_IPEX_DTYPE:-fp32}
      # Blend mask + feather. See docs/lipsync.md.
      MUSETALK_BLEND_MODE: ${MUSETALK_BLEND_MODE:-jaw}
      MUSETALK_BLEND_FEATHER: ${MUSETALK_BLEND_FEATHER:-0.04}
      # Optional CodeFormer face restoration. Applied after the MuseTalk
      # blend to recover skin detail the VAE round-trip loses.
      MUSETALK_FACE_RESTORE: ${MUSETALK_FACE_RESTORE:-codeformer}
      MUSETALK_FACE_RESTORE_FIDELITY: ${MUSETALK_FACE_RESTORE_FIDELITY:-0.7}
      MUSETALK_FACE_RESTORE_BLEND: ${MUSETALK_FACE_RESTORE_BLEND:-0.6}
      # KMP affinity helps Intel OpenMP place threads on real cores. "granularity=
      # fine,compact,1,0" is the canonical "one thread per HT sibling, packed"
      # pattern; works well on Xeon where cores share an L2.
      KMP_AFFINITY: granularity=fine,compact,1,0
      KMP_BLOCKTIME: "1"
    volumes:
      - models:/models
      - jobs:/jobs
      - ./services/musetalk/app:/app/app
      # Bind-mount scripts/ so fixes to download_models.sh etc. don't
      # require an image rebuild — matches the backend service's pattern.
      - ./services/musetalk/scripts:/app/scripts:ro
    ports:
      # Host-exposed for debugging. Backend talks to the service over Docker DNS.
      - "${MUSETALK_PORT:-8089}:8000"
    deploy:
      resources:
        limits:
          # MuseTalk inference is memory-hungry once loaded (~4-6 GB plus
          # Whisper encoder). Give it more than the backend gets.
          cpus: "8.0"
          memory: 16g

  # LatentSync lipsync microservice. Kept as a separate service (with its
  # own Python env) because LatentSync's diffusers/transformers pinning
  # conflicts with both the backend's coqui-tts pins and the MuseTalk
  # service's transformers==4.39 pin.
  #
  # PR-LS-1a (current): HTTP scaffold only; /lipsync returns 501 with a
  # structured body explaining the staging. PR-LS-1b adds torch + the
  # diffusers stack + a real download_models.sh. PR-LS-1c flips inference
  # on. Shared /jobs + /models volumes let this service and the backend
  # pass file paths (not bytes) back and forth.
  #
  # CPU realism: LatentSync on CPU is a batch job, not a live workflow.
  # Budget ~10 min of wall-clock per second of source video. See
  # docs/lipsync.md for the full architecture note.
  lipsync-latentsync:
    build:
      context: ./services/lipsync-latentsync
      dockerfile: Dockerfile
    image: polyglot-demo/lipsync-latentsync:dev
    container_name: polyglot-lipsync-latentsync
    restart: unless-stopped
    environment:
      MODEL_CACHE_DIR: /models
      JOB_ARTIFACTS_DIR: /jobs
      HF_HOME: /models/huggingface
      # HF auth token — see comment in the backend service above.
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-${HF_TOKEN:-}}
      CUDA_VISIBLE_DEVICES: ""
      # Per-request quality knobs. Defaults match LatentSync upstream.
      LATENTSYNC_STEPS: ${LATENTSYNC_STEPS:-20}
      LATENTSYNC_GUIDANCE: ${LATENTSYNC_GUIDANCE:-1.5}
      # Dry-run mode: collapses num_inference_steps to 1 so we reach the
      # end of the pipeline in minutes instead of hours — useful for
      # verifying the wiring holds (VAE loads, face detection finds a
      # face, ffmpeg writes the mp4) without committing to a full run.
      # Set LATENTSYNC_DRY_RUN=1 in .env, rebuild, re-run.
      LATENTSYNC_DRY_RUN: ${LATENTSYNC_DRY_RUN:-0}
      # --- Performance knobs (added in the 1c perf follow-up) --------- #
      # IPEX compute dtype. `fp32` is the default — bf16 was the
      # original default but a jitter bisection traced a visible
      # "quantized bouncing between 4 X/Y values" artifact on
      # near-static subjects to bf16's 8-bit mantissa snapping
      # intermediate sums to a small set of representable values
      # (ΔSTD 31% between bf16 and fp32 measured on IMG_7228.MOV,
      # see scripts/latentsync_debug/DEBUG_PLAN.md). bf16 remains
      # available as an opt-in speed mode — ~3× faster on AMX-capable
      # Xeon (Sapphire Rapids+) at the cost of that artifact, which
      # is noticeable on static/near-static subjects and acceptable
      # on active talking heads. Set LATENTSYNC_IPEX_DTYPE=bf16 in
      # .env for the speed mode.
      LATENTSYNC_IPEX_DTYPE: ${LATENTSYNC_IPEX_DTYPE:-fp32}
      # DeepCache — caches early denoising-step tensors and reuses
      # them later. ~1.3× speedup at negligible quality cost on SD 1.5.
      # Set to 0 if it ever causes an artifact you can't explain.
      LATENTSYNC_ENABLE_DEEPCACHE: ${LATENTSYNC_ENABLE_DEEPCACHE:-1}
      # Debug intermediate dumps (face detection / affine / restore).
      # Produces PNGs under /jobs/latentsync_debug/ for inspecting
      # where the pipeline is going wrong. Rate-limited per stage.
      LATENTSYNC_DEBUG_DUMP: ${LATENTSYNC_DEBUG_DUMP:-0}
      LATENTSYNC_DEBUG_FRAME_LIMIT: ${LATENTSYNC_DEBUG_FRAME_LIMIT:-3}
      # Temporal smoothing window for per-frame 3-point landmarks, applied
      # *before* the SVD-based affine estimator. This is the PRIMARY
      # smoother in the pipeline — prevents sub-pixel landmark noise
      # (common on lossy H.264 input) from amplifying into pixel-scale
      # affine drift through (s2/s1)*R in transformation_from_points.
      # Default 5 (0.2s at 25fps) is a conservative floor; 7 or 9
      # smooths more aggressively. Set to 1 to disable.
      LATENTSYNC_LANDMARK_SMOOTH_WINDOW: ${LATENTSYNC_LANDMARK_SMOOTH_WINDOW:-5}
      # Fraction of frames that can legitimately lack a detected face
      # before we fail the whole clip. Gaps below this threshold are
      # filled by carrying last-good landmarks forward (with a leading-
      # None backward extension). Above it we bail rather than produce
      # nonsense. Default 0.5 = up to half the frames may miss. Set to
      # 1.0 to disable the threshold (the all-None case still errors
      # because there is literally no geometry to work with).
      LATENTSYNC_MAX_MISSING_FACE_RATIO: ${LATENTSYNC_MAX_MISSING_FACE_RATIO:-0.5}
      # Secondary (affine-matrix) smoother — decomposes each per-frame
      # affine into (tx, ty, rotation, scale) and SG-filters each
      # component. Runs downstream of the landmark smoother above.
      # DEFAULT 1 (disabled) — cascading two SG filters can produce
      # lagged-oscillatory step responses, and the landmark smoother
      # now handles the job directly at the source. Available as an
      # opt-in belt-and-suspenders for clips where the landmark
      # smoother alone leaves residual jitter (e.g. very aggressive
      # head turns at small clip lengths where the landmark window
      # can't resolve noise from motion). Typical opt-in value: 9.
      LATENTSYNC_AFFINE_SMOOTH_WINDOW: ${LATENTSYNC_AFFINE_SMOOTH_WINDOW:-1}
      # Diagnostic bypasses for jitter bisection (see
      # scripts/latentsync_debug/DEBUG_PLAN.md). Both default to off.
      #   LATENTSYNC_BYPASS_UNET=1  — skip denoise + VAE decode entirely,
      #     pass reference face crops through to restore. Isolates
      #     geometric pipeline jitter from UNet/VAE numerical jitter.
      #   LATENTSYNC_BYPASS_MASK=1  — use the hard erosion mask for
      #     compositing instead of the Gaussian-blurred soft mask. Tests
      #     whether frame-to-frame soft-mask-radius fluctuation is
      #     adding jitter at the face boundary.
      LATENTSYNC_BYPASS_UNET: ${LATENTSYNC_BYPASS_UNET:-0}
      LATENTSYNC_BYPASS_MASK: ${LATENTSYNC_BYPASS_MASK:-0}
      # Affine dump for jitter bisection. Writes pre/post-smooth affine
      # matrices + boxes to LATENTSYNC_DUMP_AFFINES_DIR (default
      # /jobs/affine_debug) for offline analysis with
      # scripts/latentsync_debug/analyze_affines.py. Default off.
      LATENTSYNC_DUMP_AFFINES: ${LATENTSYNC_DUMP_AFFINES:-0}
      LATENTSYNC_DUMP_AFFINES_DIR: ${LATENTSYNC_DUMP_AFFINES_DIR:-/jobs/affine_debug}
      # Force LatentSync's read_video re-encode to be mathematically
      # lossless (-qp 0 instead of -crf 18). Diagnostic only — upstream's
      # crf 18 is "visually lossless" but still adds ~0.1 px landmark
      # noise that feeds the SVD affine and amplifies into output jitter.
      # Off by default; temp file is ~4-8x larger when on.
      LATENTSYNC_LOSSLESS_READ: ${LATENTSYNC_LOSSLESS_READ:-0}
      # Intel OpenMP thread affinity — pins threads to cores so they
      # don't bounce, improves cache locality on math-heavy loops.
      KMP_AFFINITY: granularity=fine,compact,1,0
      KMP_BLOCKTIME: "1"
    volumes:
      - models:/models
      - jobs:/jobs
      - ./services/lipsync-latentsync/app:/app/app
      # Bind-mount scripts/ so fixes to download_models.sh etc. don't
      # require an image rebuild — matches the backend service's pattern.
      - ./services/lipsync-latentsync/scripts:/app/scripts:ro
      # Expose the repo-level scripts/ dir (separate from the service's
      # own scripts/) at /app/repo_scripts so diagnostic tools under
      # scripts/latentsync_debug/ can run inside the service where
      # torch / insightface / etc. are available. Read-only.
      - ./scripts:/app/repo_scripts:ro
    ports:
      # Host-exposed for debugging. Backend talks to the service over
      # Docker DNS. 8090 by default to keep it clear of 8089 (MuseTalk).
      - "${LATENTSYNC_PORT:-8090}:8000"
    deploy:
      resources:
        limits:
          cpus: "8.0"
          # Memory sizing — measured peak RSS vs clip length at 1080p
          # fp32 base + bf16 IPEX + DeepCache (the PR-LS-1c perf stack):
          #
          #   1.77 s  (62 frames)   ~15 GB     (OOM'd at 16 g, source of the bug)
          #   30 s    (750 frames)  ~20 GB     video_frames buffer grows linearly
          #   60 s    (1500 frames) ~25 GB     restore peak during kornia warp
          #   4K anything           multiply video_frames / restore by 4×
          #
          # 128 g — empirically required. Measured peak RSS hit 50 GB
          # even for a 1.77 s / 62-frame 1080p clip, much higher than
          # my original ~15 GB estimate. Rather than escalate via the
          # adaptive retry path, we just give the container more
          # upfront. Host has >> 128 GB, so this is free.
          #
          # The allocator (tcmalloc + PyTorch CPU cache) is greedy and
          # fills whatever ceiling we set, so "real" working set is
          # probably smaller. A future perf follow-up could add
          # gc.collect() calls between restore frames to make memory
          # release more aggressive. For now: overprovision and move on.
          #
          # Docker quirk reminder: when the cgroup OOM killer fires (as
          # opposed to the host-level OOM killer), Docker's State.OOMKilled
          # flag reads `false`. Confirm via `sudo dmesg | grep oom`.
          memory: 128g

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time — must match the host-side
        # backend port since the browser runs outside Docker.
        NEXT_PUBLIC_API_BASE_URL: "http://localhost:${BACKEND_PORT:-8088}"
    image: polyglot-demo/frontend:dev
    container_name: polyglot-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:${BACKEND_PORT:-8088}"
    ports:
      # Host port is configurable via FRONTEND_PORT (default 3030) to avoid
      # clashing with other local apps that use 3000. Container stays on 3000.
      - "${FRONTEND_PORT:-3030}:3000"
    depends_on:
      - backend

volumes:
  models:
  jobs:
