[project]
name = "polyglot-demo-backend"
version = "0.1.0"
description = "Open-source video translation demo backend (CPU-only build)"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }

dependencies = [
  "fastapi>=0.110",
  "uvicorn[standard]>=0.27",
  "pydantic>=2.6",
  "pydantic-settings>=2.2",
  "python-multipart>=0.0.9",
  "sse-starlette>=2.1",
  "anyio>=4.3",

  # Pipeline
  "ffmpeg-python>=0.2",
  "faster-whisper>=1.0.3",

  # NLLB translation. transformers wants torch; we install the CPU wheel.
  "transformers>=4.40",
  "sentencepiece>=0.2",
  "numpy<2",

  # torch is intentionally NOT pinned here so users can install the CPU wheel
  # via the PyTorch CPU index. The Dockerfile installs it explicitly.
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "httpx>=0.27",
  "ruff>=0.4",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["app*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
